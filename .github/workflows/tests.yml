name: Tests

on:
  pull_request:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Modelica runtime
        run: sudo bash .devcontainer/install_dependencies.sh

      - name: Install uv
        run: |
          pip install uv

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install -e '.[dev]'

      - name: Run tests
        run: uv run pytest tests

      - name: Install examples package
        run: uv pip install -e 'examples[test]'

      - name: Run examples
        working-directory: examples
        run: |
          uv run python -m kinematic_vehicle
          uv run python -m kinematic_vehicle parameters/state_0=front_position
          uv run python -m kinematic_vehicle experiment=front_position
          uv run python -m kinematic_vehicle -m session.parameters.v_norm=10,20

      - name: Run examples tests
        working-directory: examples
        run: uv run pytest tests
