name: Tests

on:
  pull_request:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Modelica runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl gnupg pipx
          curl -fsSL https://build.openmodelica.org/apt/openmodelica.asc | gpg --dearmor | sudo tee /usr/share/keyrings/openmodelica-keyring.gpg >/dev/null
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/openmodelica-keyring.gpg] https://build.openmodelica.org/apt $(grep -E '(UBUNTU|DEBIAN|VERSION)_CODENAME' /etc/os-release | sort | cut -d= -f2 | head -1) stable" | sudo tee /etc/apt/sources.list.d/openmodelica.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends omc omlibrary

      - name: Install uv
        run: python -m pip install --user pipx && python -m pipx install uv

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install -e '.[dev]'

      - name: Install examples package
        run: uv pip install -e ./examples

      - name: Run examples
        working-directory: examples
        run: |
          ../.venv/bin/python -m kinematic_vehicle
          ../.venv/bin/python -m kinematic_vehicle parameters/state_0=front_position
          ../.venv/bin/python -m kinematic_vehicle experiment=front_position
          ../.venv/bin/python -m kinematic_vehicle -m session.parameters.v_norm=10,20

      - name: Run tests
        run: uv run pytest